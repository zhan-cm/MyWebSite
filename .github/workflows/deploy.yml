name: Deploy Astro Site

# 当代码推送到 main 分支时自动触发 (如果你的主分支叫 master，请改成 master)
on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取最新代码
        uses: actions/checkout@v4

      - name: 2. 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. 安装依赖并打包 Astro
        run: |
          npm install
          npm run build

      - name: 4. 传输打包文件到你的服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/*"
          # ⚠️ 下面这行极其关键！必须换成你服务器上真实存放网站的路径
          target: "/www/wwwroot/www.aichezhan.top" 
          strip_components: 1